name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-venv python3-dev \
            zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libfreetype6-dev libpng-dev libffi-dev liblzma-dev \
            cmake libssl-dev autoconf-archive \
            git wget curl gcc g++ make file python3-setuptools

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          android-platform-version: 33

      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          echo "=== Java version ==="
          java -version 2>&1
          echo "=== aidl location ==="
          which aidl || echo "aidl not in PATH"
          find /usr/local/lib/android -name "aidl" 2>/dev/null | head -3
          echo "=== ANDROID_HOME: $ANDROID_HOME ==="
          echo "=== ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT ==="
          echo "=== Starting build ==="
          buildozer android debug
        timeout-minutes: 120

      - name: Show results
        if: always()
        run: |
          echo "=== bin/ ==="
          ls -la bin/ 2>/dev/null || echo "No bin"
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nettest-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Create Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          tag_name: apk-v${{ github.run_number }}
          name: "APK v${{ github.run_number }}"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
