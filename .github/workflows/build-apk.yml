name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-venv python3-dev \
            zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libfreetype6-dev libpng-dev libffi-dev liblzma-dev \
            cmake libssl-dev autoconf-archive \
            git wget curl gcc g++ make file python3-setuptools

      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug
        timeout-minutes: 120

      - name: Find and upload APK
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== bin dir ==="
          ls -la bin/ 2>/dev/null || echo "No bin dir"
          echo "=== .buildozer dir ==="
          ls -la .buildozer/ 2>/dev/null || echo "No .buildozer dir"
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nettest-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload full log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: |
            .buildozer/android/platform/build-armeabi-v7a/dists/nettest/.buildozer/log.txt
            .buildozer/log.txt
          if-no-files-found: warn

      - name: Create Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          tag_name: apk-v${{ github.run_number }}
          name: "APK v${{ github.run_number }}"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
