name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-ubuntu22-v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pip python3-venv python3-dev \
            zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libfreetype6-dev libpng-dev libffi-dev liblzma-dev \
            cmake libssl-dev autoconf-archive \
            git wget curl gcc g++ make file \
            python3-setuptools

      - name: Install buildozer
        run: |
          pip install --user --upgrade pip setuptools wheel
          pip install --user buildozer

      - name: Build APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug
        timeout-minutes: 120

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: |
            bin/*.apk
            .buildozer/android/platform/build-armeabi-v7a/dists/myapp/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Show build log tail
        if: failure()
        run: tail -200 .buildozer/android/platform/build-armeabi-v7a/dists/myapp/.buildozer/log.txt 2>/dev/null || tail -200 .buildozer/log.txt 2>/dev/null || echo "No log found"

      - name: Create Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          tag_name: apk-v${{ github.run_number }}
          name: "APK v${{ github.run_number }}"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
