name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system deps + 32-bit libs
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv python3-dev \
            zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libfreetype6-dev libpng-dev libffi-dev liblzma-dev \
            cmake libssl-dev autoconf-archive \
            git wget curl gcc g++ make file python3-setuptools
          sudo apt-get install -y libc6:i386 libncurses5:i386 libstdc++6:i386 lib32z1 libbz2-1.0:i386

      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0

      - name: Pre-setup Android SDK with build-tools 33.0.1 (has aidl)
        run: |
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
          SDK_DIR=~/.buildozer/android/platform/android-sdk
          mkdir -p "$SDK_DIR/cmdline-tools/latest/bin"
          
          # Download cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip -O cmdline.zip
          unzip -q cmdline.zip
          mv cmdline-tools/bin/* "$SDK_DIR/cmdline-tools/latest/bin/" 2>/dev/null || true
          mkdir -p "$SDK_DIR/cmdline-tools/latest/lib"
          cp -r cmdline-tools/lib/* "$SDK_DIR/cmdline-tools/latest/lib/" 2>/dev/null || true
          mkdir -p "$SDK_DIR/cmdline-tools/latest/lib/clinewrapper"
          cp -r cmdline-tools/lib/clinewrapper/* "$SDK_DIR/cmdline-tools/latest/lib/clinewrapper/" 2>/dev/null || true
          
          export ANDROID_HOME=$SDK_DIR
          export PATH="$SDK_DIR/cmdline-tools/latest/bin:$PATH"
          
          # Accept licenses
          yes | sdkmanager --licenses > /dev/null 2>&1
          
          # Install build-tools 33.0.1 which has aidl, platform-tools, and platform
          sdkmanager "build-tools;33.0.1" "platform-tools" "platforms;android-33"
          
          # Verify aidl exists
          ls -la "$SDK_DIR/build-tools/33.0.1/aidl"
          echo "=== aidl verified ==="

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
          ANDROID_HOME: ~/.buildozer/android/platform/android-sdk
        run: |
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          echo "=== Java ==="
          java -version 2>&1
          echo "=== aidl check ==="
          ls -la "$ANDROID_HOME/build-tools/33.0.1/aidl"
          echo "=== Starting build ==="
          buildozer android debug
        timeout-minutes: 120

      - name: Show results
        if: always()
        run: |
          echo "=== bin/ ==="
          ls -la bin/ 2>/dev/null || echo "No bin"
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nettest-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Create Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          tag_name: apk-v${{ github.run_number }}
          name: "APK v${{ github.run_number }}"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
