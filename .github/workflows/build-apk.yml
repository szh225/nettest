name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system deps + 32-bit libs
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv python3-dev \
            zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libfreetype6-dev libpng-dev libffi-dev liblzma-dev \
            cmake libssl-dev autoconf-archive \
            git wget curl gcc g++ make file python3-setuptools
          sudo apt-get install -y libc6:i386 libncurses5:i386 libstdc++6:i386 lib32z1 libbz2-1.0:i386

      - name: Install buildozer and patch it
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0
          
          # Patch buildozer to skip aidl check (new build-tools don't have aidl anymore)
          PYTHON_DIR=$(python -c "import site; print(site.getsitepackages()[0])")
          ANDROID_PY="$PYTHON_DIR/buildozer/targets/android.py"
          
          echo "=== Patching android.py ==="
          python3 -c "
          import re
          with open('$ANDROID_PY', 'r') as f:
              content = f.read()
          
          # Replace _check_aidl to be a no-op
          old_check = '''    def _check_aidl(self, v_build_tools):
        self.logger.debug('Check that aidl can be executed')
        v_build_tools = self._read_version_subdir(self.android_sdk_dir,
                                                  'build-tools')
        aidl_cmd = join(self.android_sdk_dir, 'build-tools',
                        str(v_build_tools), 'aidl')
        buildops.checkbin('Aidl', aidl_cmd)'''
          
          new_check = '''    def _check_aidl(self, v_build_tools):
        self.logger.debug('Check that aidl can be executed - SKIPPED (patched)')
        return'''
          
          content = content.replace(old_check, new_check)
          
          with open('$ANDROID_PY', 'w') as f:
              f.write(content)
          print('Patch applied successfully')
          "
          
          # Verify patch
          grep -A2 "_check_aidl" "$ANDROID_PY" | head -5

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: |
          echo "=== Starting build ==="
          buildozer android debug
        timeout-minutes: 120

      - name: Show results
        if: always()
        run: |
          echo "=== bin/ ==="
          ls -la bin/ 2>/dev/null || echo "No bin"
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nettest-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Create Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          tag_name: apk-v${{ github.run_number }}
          name: "APK v${{ github.run_number }}"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
