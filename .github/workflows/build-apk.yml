name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-venv python3-dev \
            zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libfreetype6-dev libpng-dev libffi-dev liblzma-dev \
            cmake libssl-dev autoconf-archive \
            git wget curl gcc g++ make file python3-setuptools

      - name: Install Android SDK command-line tools (for aidl)
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip -O cmdline.zip
          unzip -q cmdline.zip
          mv cmdline-tools latest
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "platform-tools" "build-tools;33.0.0" "platforms;android-33"

      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: $HOME/android-sdk
        run: |
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$PATH
          echo "=== Checking aidl ==="
          find $HOME/android-sdk -name "aidl" 2>/dev/null
          buildozer android debug
        timeout-minutes: 120

      - name: Show results
        if: always()
        run: |
          echo "=== bin/ ==="
          ls -la bin/ 2>/dev/null || echo "No bin"
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nettest-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Create Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          tag_name: apk-v${{ github.run_number }}
          name: "APK v${{ github.run_number }}"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
